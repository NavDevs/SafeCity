<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- Orange gradient background -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e74c3c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)" stroke="#2c3e50" stroke-width="8"/>
  
  <!-- Map/Location icon in center -->
  <path d="M 256 150 Q 200 150 200 200 Q 200 250 256 350 Q 312 250 312 200 Q 312 150 256 150 Z" fill="white" stroke="#2c3e50" stroke-width="4"/>
  
  <!-- Inner circle for location pin -->
  <circle cx="256" cy="200" r="25" fill="#2c3e50"/>
  
  <!-- Guardian text at bottom -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="white">GUARDIAN</text>
  <text x="256" y="460" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#ecf0f1">GO</text>
</svg>