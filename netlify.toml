# Netlify configuration for SafeCity landing page
# This file tells Netlify how to deploy the site

[build]
  # The folder to deploy
  publish = "web"

# Serve the APK with correct MIME type so browsers download it directly
[[headers]]
  for = "/downloads/*.apk"
  [headers.values]
    Content-Type = "application/vnd.android.package-archive"
    Content-Disposition = "attachment"

# Cache static assets aggressively
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Redirect all routes to index.html (SPA-style fallback)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
